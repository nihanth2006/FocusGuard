<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 240px;
      height: 240px;
      margin: 0;
      padding: 0;
      background: transparent !important;
      border: none;
      box-shadow: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      clip-path: circle(120px);
    }
    
    .circle-container {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
      box-shadow: 0 0 40px 15px #1e5f7a, 0 0 60px 25px rgba(30, 95, 122, 0.5);
    }
    
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      gap: 2px;
    }
    
    .logo {
      font-size: 20px;
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    h1 {
      font-size: 10px;
      font-weight: 700;
      margin: 0;
      text-align: center;
    }
    
    .focus-text {
      color: white;
    }
    
    .guard-text {
      color: #00a8ff;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      margin: 5px 0;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #666;
      transition: 0.3s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #0066cc;
    }
    
    input:checked + .slider:before {
      transform: translateX(16px);
    }
    
    .status-text {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #ccc;
      margin-bottom: 3px;
    }
    
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 90%;
      margin-top: 6px;
    }
    
    button {
      padding: 5px 8px;
      font-size: 8px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    #start {
      background: linear-gradient(135deg, #0052cc 0%, #0066ff 100%);
      color: white;
      box-shadow: 0 2px 6px rgba(0, 82, 204, 0.3);
    }
    
    #start:hover {
      transform: scale(1.05);
      box-shadow: 0 3px 8px rgba(0, 82, 204, 0.4);
    }
    
    #start:disabled {
      background: #999;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    
    #stop {
      background-color: #d32f2f;
      color: white;
      box-shadow: 0 2px 6px rgba(211, 47, 47, 0.3);
    }
    
    #stop:hover {
      background-color: #c62828;
      transform: scale(1.05);
      box-shadow: 0 3px 8px rgba(211, 47, 47, 0.4);
    }
    
    #stop:disabled {
      background: #aaa;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
  </style>
</head>

<body>
  <div class="circle-container">
    <div class="header">
      <div class="logo">🛡️</div>
      <h1><span class="focus-text">Focus</span><span class="guard-text">Guard</span></h1>
    </div>
    
    <div class="status-text" id="status-text">OFF</div>
    
    <label class="toggle-switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
    
    <div class="button-container">
      <button id="start">START</button>
      <button id="stop" disabled>STOP</button>
    </div>
  </div>
</body>



  <script src="popup.js"></script>
</body>
</html>
